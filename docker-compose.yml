services:
  web:
    build: .
    container_name: taildown_web
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/dbdata
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_ENV=development
    restart: unless-stopped

volumes:
  sqlite_data:
