{% extends 'base.html' %}
{% block title %}Login{% endblock title %}
{% block content %}
<div class="flex items-center justify-center w-full px-4 py-10">
  <div class="w-full max-w-lg p-8 sm:p-12 space-y-10 bg-emerald-100 rounded-3xl shadow-2xl border border-emerald-200 transition-all duration-300">
    <h2 class="text-3xl font-bold text-center text-emerald-900">Login to Your Account</h2>
    <form action="" method="POST" class="space-y-6" novalidate>
        {% csrf_token %}
        <!-- Email Field -->
        <div>
            <label for="email" class="block text-md font-medium text-emerald-800">Email</label>
            <input type="email" name="email" id="email" autocomplete="username"
                   class="font-serif block w-full mt-1 bg-white border border-emerald-200 rounded-lg shadow-sm p-2.5 text-sm focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 transition-all" 
                   placeholder="you@example.com" required>
        </div>
        <!-- Password Field -->
        <div>
            <label for="password" class="block text-md font-medium text-emerald-800">Password</label>
            <input type="password" name="password" id="password" autocomplete="current-password"
                   class="font-serif block w-full mt-1 bg-white border border-emerald-200 rounded-lg shadow-sm p-2.5 text-sm focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 transition-all" 
                   placeholder="••••••••" required>
        </div>
        <!-- Forgot Password Link -->
        <div class="text-right">
            <a href="{% url 'password_reset' %}" class="font-serif text-sm text-rose-500 hover:text-rose-700 hover:underline">Forgot password?</a>
        </div>
        <!-- Login Button -->
        <button type="submit" class="w-full px-4 py-3 text-lg font-semibold text-white rounded-xl bg-rose-500 hover:bg-rose-600 shadow-md transition-all">
            Sign in
        </button>
    </form>
    <!-- Divider -->
    <div class="relative mt-10">
        <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-emerald-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-emerald-100 text-emerald-600 font-bold uppercase tracking-widest">Or</span>
        </div>
    </div>
    <!-- Create Account Link -->
    <div class="text-center pt-2">
        <a href="{% url 'register' %}" class="text-md font-medium text-emerald-700 hover:text-emerald-900 hover:underline">Need an account? Create one here</a>
    </div>
  </div>
</div>
{% endblock content %}
