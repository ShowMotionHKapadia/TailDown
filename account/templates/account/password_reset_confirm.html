<!-- Enter New Password Form -->
{% extends 'base.html' %}
{% block title %}Password Reset Confirm{% endblock title %}
{% load static %} 
{% block content %}
<div class="flex-grow flex items-center justify-center w-full">
  <div class="w-full max-w-md p-6 sm:p-10 space-y-8 bg-emerald-100 rounded-2xl shadow-2xl border border-gray-700">
    <h2 class="text-2xl font-bold text-center text-gray-900">Set New Password</h2>
    <form action="#" method="POST" class="space-y-6" novalidate>
      {% csrf_token %}
      <div>
        <label for="new_password1" class="block text-sm font-medium text-gray-700">New Password</label>
        <input type="password" 
               name="new_password1" 
               id="new_password1" 
               class="font-serif block w-full mt-1 border-gray-300 rounded-md shadow-sm p-2 focus:ring-emerald-500 focus:border-emerald-500" 
               placeholder="••••••••"
               required>
      </div>

      <div>
        <label for="new_password2" class="block text-sm font-medium text-gray-700">Confirm Password</label>
        <input type="password" 
               name="new_password2" 
               id="new_password2" 
               class="font-serif block w-full mt-1 border-gray-300 rounded-md shadow-sm p-2 focus:ring-emerald-500 focus:border-emerald-500" 
               placeholder="••••••••"
               required>
      </div>

      <button type="submit" 
              class="w-full px-4 py-2 text-white bg-rose-500 rounded-md hover:bg-rose-600 focus:outline-none transition-colors shadow-md">
        Set Password
      </button>
    </form>
  </div>
</div>
{% endblock content %}
