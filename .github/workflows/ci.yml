#Test TailDown CI workflow
name: TailDown CI Test
on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  build:
    runs-on: ubuntu-latest

     # Step 1: Pull code into the machine
    steps:
     - name: Checkout code
       uses: actions/checkout@v5
    
      # Step 2: Install Python
     - name: Setup python
       uses: actions/setup-python@v5
       with:
         python-version: '3.12'
     
     # Step 3: Install dependencies
     - name: Install dependencies
       run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
    
      # Step 4: Run tests
     - name: Run tests
       run: |
          python manage.py test
          python manage.py test customer -v 2
       env:
          DEBUG: ${{ secrets.DEBUG }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          EBACKEND: ${{ secrets.EBACKEND }}
          EHOST: ${{ secrets.EHOST }}
          EHOSTUSER: ${{ secrets.EHOSTUSER }}
          EHOSTPASSWORD: ${{ secrets.EHOSTPASSWORD }}
          EPORT: ${{ secrets.EPORT }}
          EUSETLS: ${{ secrets.EUSETLS }}
          EUSESSL: ${{ secrets.EUSESSL }}
          SECURE_SSL_REDIRECT: ${{ secrets.SECURE_SSL_REDIRECT }}
          SESSION_COOKIE_SECURE: ${{ secrets.SESSION_COOKIE_SECURE }}
          CSRF_COOKIE_SECURE: ${{ secrets.CSRF_COOKIE_SECURE }}
          SECURE_HSTS_INCLUDE_SUBDOMAINS: ${{ secrets.SECURE_HSTS_INCLUDE_SUBDOMAINS }}
          SECURE_HSTS_PRELOAD: ${{ secrets.SECURE_HSTS_PRELOAD }}



    